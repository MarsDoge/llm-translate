name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -x -e SC1091
        with:
          scandir: ./bin
          additional_files: 'lib/providers/deepseek.sh lib/providers/openai.sh lib/providers/claude.sh lib/providers/ollama.sh'
